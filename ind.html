<!DOCTYPE html>
<html>
<head>
    <title>My Static Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background:  #00f2fe;
            text-align: center;
            color: white;
            margin-top: 100px;
        }

        .container {
            background: #0077cc;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }
        button {
            background-color: white;
            color: #3d6988;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to My Website</h1>
        <p>AWS S3 Static Website Hosting</p>
        <button onclick="showMessage()">Click Me</button>
        <h3 id="message"></h3>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                " static website is running successfully on AWS S3";
        }
    </script>

</body>
</html>
